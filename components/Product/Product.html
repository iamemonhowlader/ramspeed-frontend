<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm hover:shadow-md border border-gray-200 overflow-hidden group flex flex-col transition">
    <!-- Product Image -->
    <div class="relative w-full h-64 overflow-hidden p-6">
      <!-- Countdown Timer -->
      <div class="absolute top-2 right-2 text-white text-sm font-bold bg-red-600 px-2 py-1 rounded-md">
        01:30:00
      </div>
      <a href="#" class="block w-full h-full">
        <img src="/controller.png" alt="Air buds, beat the sound with ultimate mode" class="w-full h-full object-contain hover:scale-110 transition-transform duration-300">
      </a>
    </div>

    <!-- Product Details -->
    <div class="p-6 flex flex-col justify-between flex-1">
      <!-- Title -->
      <h2 class="text-lg font-semibold text-gray-900 mb-3 line-clamp-2">
        <a href="#">Air buds, beat the sound with ultimate mode</a>
      </h2>

      <!-- Availability + SKU -->
      <div class="flex flex-col sm:flex-row items-start gap-1 sm:items-center justify-between text-sm mb-4">
        <span>Availability: <span class="text-green-600 font-medium">6 pcs</span></span>
        <span>SKU: <span class="text-blue-600">A264671</span></span>
      </div>

      <!-- Pricing -->
      <div class="bg-[#e6ebef] text-primary p-3 w-full flex flex-col sm:flex-row justify-between text-sm sm:text-lg font-bold mb-6 rounded-lg">
        <span>Wholesaler</span>
        <span>€ 300.45</span>
      </div>

      <!-- Quantity Selector + Add to Cart -->
      <div class="flex flex-col xl:flex-row items-center gap-4 mb-6">
        <!-- Quantity Selector -->
        <div class="flex items-center border rounded-md overflow-hidden">
          <button class="w-10 h-10 flex items-center justify-center hover:bg-gray-50 transition-colors">–</button>
          <div class="w-12 h-10 flex items-center justify-center cursor-pointer border-x bg-white">
            <span class="text-sm">01</span>
          </div>
          <button class="w-10 h-10 flex items-center justify-center hover:bg-gray-50 transition-colors">+</button>
        </div>
        <!-- Add to Cart Button -->
        <button class="flex-1 bg-primary hover:bg-primary/90 text-white py-3 px-6 rounded-md transition-colors duration-200 text-sm uppercase tracking-wide whitespace-nowrap cursor-pointer">
          Add to Cart
        </button>
      </div>

      <!-- Price in Cyprus -->
      <div class="border border-primary text-primary p-3 w-full flex flex-col sm:flex-row justify-between text-sm sm:text-lg font-bold mb-6 rounded-lg">
        <span>Price in Cyprus</span>
        <span>€ 300.45</span>
      </div>

      <!-- Short Details (hover reveal) -->
      <div class="max-h-0 overflow-hidden opacity-0 group-hover:max-h-48 group-hover:opacity-100 transition-all duration-500 ease-in-out">
        <ul class="list-disc pl-5 space-y-1 text-sm">
          <li class="font-semibold">100% cotton, 100% polyester, 100% rayon</li>
          <li class="font-semibold">Soft-touch finish, breathable fabric</li>
          <li class="font-semibold">Machine washable</li>
        </ul>
      </div>
    </div>
  </div>

</body>
</html>
