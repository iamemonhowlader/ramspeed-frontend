<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product RMA Form | RAMSPEED CY</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <span class="text-primary">RAM</span>SPEED
            </a>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="card border-0 shadow-lg p-4 p-lg-5 rounded-4">
                <h1 class="display-5 fw-bold text-dark mb-5 border-bottom pb-4">Product RMA form</h1>
                
                <form>
                    <!-- Photos -->
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label fw-bold h4 mb-3">Before photo</label>
                            <div class="upload-area border-2 border-dashed rounded-4 p-5 text-center bg-light cursor-pointer">
                                <i class="bi bi-camera fs-1 text-muted mb-2 d-block"></i>
                                <p class="mb-0 small fw-bold text-muted">Click to upload before photo</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold h4 mb-3">After photo (optional)</label>
                            <div class="upload-area border-2 border-dashed rounded-4 p-5 text-center bg-light cursor-pointer">
                                <i class="bi bi-camera fs-1 text-muted mb-2 d-block"></i>
                                <p class="mb-0 small fw-bold text-muted">Click to upload after photo</p>
                            </div>
                        </div>
                    </div>

                    <!-- Customer Info -->
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Customer Name</label>
                            <input type="text" class="form-control py-3 rounded-3" placeholder="Enter your full name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Phone Number</label>
                            <input type="tel" class="form-control py-3 rounded-3" placeholder="Enter your phone number">
                        </div>
                    </div>

                    <!-- Device Details -->
                    <div class="row g-4 mb-5">
                        <div class="col-md-3">
                            <label class="form-label fw-bold small">Device type</label>
                            <select class="form-select py-3 rounded-3">
                                <option value="">Device type</option>
                                <option>Phone</option>
                                <option>Tablet</option>
                                <option>Laptop</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small">Others (Optional)</label>
                            <input type="text" class="form-control py-3 rounded-3" placeholder="Write device name">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small">Brand</label>
                            <input type="text" class="form-control py-3 rounded-3" placeholder="Enter brand">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small">Model</label>
                            <input type="text" class="form-control py-3 rounded-3" placeholder="Enter device model">
                        </div>
                    </div>

                    <!-- Multiple Select -->
                    <div class="mb-5 p-4 bg-light rounded-4">
                        <h6 class="text-primary fw-bold uppercase mb-4">Included with device:</h6>
                        <div class="row g-3">
                            <div class="col-6 col-md-2">
                                <label class="d-block small fw-bold mb-2">Charger</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="charger" id="c1"> <label for="c1">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="charger" id="c2" checked> <label for="c2">No</label>
                                </div>
                            </div>
                            <!-- Add remaining checkboxes similarly... -->
                        </div>
                    </div>

                    <!-- Issues -->
                    <div class="mb-4">
                        <label class="form-label fw-bold small">Issue description</label>
                        <textarea class="form-control py-3 rounded-3" rows="4" placeholder="Describe the device problem"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-3 pt-4 border-top mt-5">
                        <button type="reset" class="btn btn-outline-secondary px-5 py-3 rounded-3 fw-bold uppercase">Reset</button>
                        <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold uppercase shadow-sm">Save Form</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-white text-center border-top mt-5">
        <p class="mb-0 text-muted small">&copy; 2026 RAMSPEED CY. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
