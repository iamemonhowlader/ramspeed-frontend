<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | MikeOnouf Administration</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <header class="glass-header sticky-top py-2">
        <div class="container-fluid px-lg-5">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-link d-xl-none p-0 text-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                        <i class="bi bi-list fs-2"></i>
                    </button>
                    <a href="dashboard.html" class="navbar-brand fw-bold fs-4 d-flex align-items-center text-decoration-none">
                        <span class="text-primary">Mike</span>Onouf
                    </a>
                </div>
                <nav class="d-none d-xl-flex align-items-center gap-1">
                    <a href="dashboard.html" class="nav-link-premium">
                        <i class="bi bi-house"></i> Home
                    </a>
                    <a href="manage-products.html" class="nav-link-premium active">
                        <i class="bi bi-box"></i> Products
                    </a>
                </nav>
                <div class="d-flex align-items-center justify-content-end gap-2 gap-sm-4 flex-grow-1">
                     <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user" class="rounded-circle border" width="40" height="40">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-5 bg-light min-vh-100">
        <div class="container-fluid px-lg-5">
            
            <div class="row align-items-center mb-5">
                <div class="col">
                    <h1 class="fw-bold mb-1">Manage <span class="text-primary">Products</span></h1>
                    <p class="text-muted">Edit and monitor all your shop products.</p>
                </div>
                <div class="col-auto d-flex gap-2">
                    <button class="btn btn-outline-secondary px-4 rounded-3 text-dark">Back</button>
                    <button class="btn btn-primary px-4 rounded-3 shadow-sm">Add Product</button>
                </div>
            </div>

            <!-- Table -->
            <div class="card card-premium overflow-hidden border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Product Name</th>
                                <th>SKU</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="table-primary table-opacity-10 border-start border-primary border-4">
                                <td class="ps-4 fw-bold">Gaming Mouse Razer v2</td>
                                <td>GMR-992</td>
                                <td>Peripherals</td>
                                <td>€79.00</td>
                                <td class="fw-bold">120</td>
                                <td class="text-center">
                                    <button class="btn btn-light btn-sm"><i class="bi bi-pencil-square"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
