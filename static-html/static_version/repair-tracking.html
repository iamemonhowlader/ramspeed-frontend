<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Repair | RAMSPEED CY</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <span class="text-primary">RAM</span>SPEED
            </a>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="card border-0 shadow-sm p-4 p-lg-5 rounded-4 overflow-hidden">
                <div class="row">
                    <div class="col-lg-8">
                        <h1 class="display-5 fw-black text-dark mb-4">Track your repair</h1>
                        <p class="text-muted mb-5 lead">To track your order please enter your Order ID in the box below and press the "Track" button. This was given to you on your receipt and in the confirmation email you should have received.</p>
                        
                        <form action="repair-status.html">
                            <div class="mb-5">
                                <label class="form-label fw-bold text-dark mb-3">Ticket ID</label>
                                <input type="text" class="form-control py-3 px-4 rounded-4 border-2 shadow-none" placeholder="Enter your ticket ID">
                            </div>
                            
                            <div class="mb-5">
                                <label class="form-label fw-bold text-dark mb-3">Phone number</label>
                                <input type="tel" class="form-control py-3 px-4 rounded-4 border-2 shadow-none" placeholder="Enter your phone number">
                            </div>
                            
                            <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold uppercase letter-spacing-1 shadow-primary">TRACK</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .fw-black { font-weight: 900; }
        .letter-spacing-1 { letter-spacing: 1px; }
        .shadow-primary { box-shadow: 0 10px 20px rgba(0, 104, 200, 0.2); }
        .form-control:focus { border-color: var(--primary-color); }
    </style>

    <footer class="py-4 bg-white text-center border-top mt-5">
        <p class="mb-0 text-muted small">&copy; 2026 RAMSPEED CY. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
