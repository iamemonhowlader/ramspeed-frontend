<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | RAMSPEED CY</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <span class="text-primary">RAM</span>SPEED
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container px-4 px-md-0">
            <h2 class="fw-bold uppercase mb-5">Proceed to Checkout</h2>
            
            <div class="row g-4">
                <div class="col-lg-8">
                    <!-- Billing Info -->
                    <div class="card border-0 shadow-sm p-4 p-md-5 rounded-4 mb-4" style="border-top: 5px solid var(--primary-color) !important;">
                        <h4 class="fw-bold uppercase mb-4">Billing Information</h4>
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">First Name</label>
                                    <input type="text" class="form-control py-3" placeholder="First name">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Last Name</label>
                                    <input type="text" class="form-control py-3" placeholder="Last name">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label small fw-bold">Company Name (Optional)</label>
                                    <input type="text" class="form-control py-3">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label small fw-bold">Address</label>
                                    <input type="text" class="form-control py-3">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Email</label>
                                    <input type="email" class="form-control py-3">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Phone Number</label>
                                    <input type="tel" class="form-control py-3">
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Payment Options -->
                    <div class="card border-0 shadow-sm p-4 p-md-5 rounded-4" style="border-top: 5px solid var(--primary-color) !important;">
                        <h4 class="fw-bold uppercase mb-4">Payment Option</h4>
                        <div class="row g-3 mb-4">
                            <div class="col-6 col-md-4 col-lg-2">
                                <div class="border rounded-4 p-3 text-center cursor-pointer hover-shadow transition active-payment">
                                    <img src="https://cdn-icons-png.flaticon.com/512/2489/2489190.png" width="30" class="mb-2" alt="COD">
                                    <p class="smaller fw-bold mb-0">Cash</p>
                                </div>
                            </div>
                            <!-- More payment icons... -->
                        </div>

                        <div class="mt-4">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Name on Card</label>
                                <input type="text" class="form-control py-3">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Card Number</label>
                                <input type="text" class="form-control py-3" placeholder="1234 5678 9012 3456">
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Expire Date</label>
                                    <input type="text" class="form-control py-3" placeholder="MM/YY">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">CVC</label>
                                    <input type="text" class="form-control py-3" placeholder="123">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar Summary -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-4 p-md-5 rounded-4 sticky-top" style="top: 100px;">
                        <h5 class="fw-bold mb-4 uppercase">Cart Details</h5>
                        <div class="border-bottom mb-4">
                            <div class="d-flex gap-3 mb-3 pb-3 border-bottom">
                                <div class="bg-light rounded p-2" style="width: 60px; height: 60px;">
                                    <img src="https://images.unsplash.com/photo-1593642632823-8f785ba67e45?auto=format&fit=crop&q=80&w=100" class="img-fluid" alt="">
                                </div>
                                <div class="flex-grow-1">
                                    <p class="small fw-bold mb-1">Xbox Series Console</p>
                                    <p class="smaller text-muted mb-0">3 x €300.45</p>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h6 class="fw-bold mb-3">Shipping</h6>
                            <div class="d-flex justify-content-between mb-2 small">
                                <span>Free shipping</span> <span>€60.00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2 small text-primary fw-bold">
                                <span>Akis pickup:</span> <span>€5.00</span>
                            </div>
                        </div>

                        <div class="border-top pt-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small">Sub-total</span>
                                <span class="fw-bold">€901.35</span>
                            </div>
                            <div class="d-flex justify-content-between mb-4 pb-2 border-bottom">
                                <span class="text-muted small">Total Tax</span>
                                <span class="fw-bold">€32.24</span>
                            </div>
                            <div class="d-flex justify-content-between pt-2">
                                <h4 class="fw-bold">Total</h4>
                                <h4 class="fw-bold text-primary">€998.59</h4>
                            </div>
                        </div>

                        <a href="order-placed.html" class="btn btn-primary w-100 py-4 mt-4 rounded-4 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2">
                            Place Order <i class="bi bi-arrow-right fs-4"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-white text-center border-top mt-5">
        <p class="mb-0 text-muted small">&copy; 2026 RAMSPEED CY. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
