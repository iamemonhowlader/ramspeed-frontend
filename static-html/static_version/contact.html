<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | RAMSPEED CY</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header (Same as index) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <span class="text-primary">RAM</span>SPEED
            </a>
            <div class="collapse navbar-collapse" id="navPublic">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
                    <li class="nav-item"><a class="nav-link fw-semibold" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold" href="shop.html">Shop Now</a></li>
                    <li class="nav-item"><a class="nav-link active fw-semibold" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-body p-0">
                    <div class="row g-0">
                        <!-- Left Side: Info & Map -->
                        <div class="col-lg-5 bg-white p-5">
                            <h1 class="fw-bold mb-4">Do you have some questions?</h1>
                            <p class="text-muted mb-5">We are at your disposal 7 days a week!</p>
                            
                            <div class="mb-4">
                                <p class="mb-1">205 Faneromenis Avenue</p>
                                <p class="mb-1">Code: 6035 City: Larnaca</p>
                                <p class="mb-1">Country: Cyprus</p>
                            </div>

                            <p class="fw-bold text-dark mb-1">info@ramspeedcy.com</p>
                            <p class="fw-bold text-primary fs-4 mb-5">+357 24400601</p>

                            <div class="d-flex gap-3 mb-5">
                                <a href="#" class="btn btn-light rounded-circle p-2"><i class="bi bi-facebook fs-5"></i></a>
                                <a href="#" class="btn btn-light rounded-circle p-2"><i class="bi bi-instagram fs-5"></i></a>
                                <a href="#" class="btn btn-light rounded-circle p-2"><i class="bi bi-whatsapp fs-5"></i></a>
                                <a href="#" class="btn btn-light rounded-circle p-2"><i class="bi bi-tiktok fs-5"></i></a>
                            </div>

                            <!-- Map Placeholder -->
                            <div class="map-placeholder rounded-4 bg-light d-flex align-items-center justify-content-center text-muted" style="height: 300px; border: 1px dashed #ddd;">
                                <div class="text-center">
                                    <i class="bi bi-geo-alt-fill fs-1 d-block mb-2"></i>
                                    <span>Google Maps Integrated Here</span>
                                </div>
                            </div>
                        </div>

                        <!-- Right Side: Form -->
                        <div class="col-lg-7 bg-light p-5">
                            <form>
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small">Name</label>
                                        <input type="text" class="form-control py-3" placeholder="Enter your name">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small">Surname</label>
                                        <input type="text" class="form-control py-3" placeholder="Enter your surname">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small">Email</label>
                                        <input type="email" class="form-control py-3" placeholder="Enter email address">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small">Phone number</label>
                                        <input type="tel" class="form-control py-3" placeholder="Enter phone number">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label fw-bold small">Country</label>
                                        <input type="text" class="form-control py-3" placeholder="Enter country name">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label fw-bold small">Message</label>
                                        <textarea class="form-control" rows="5" placeholder="Write your message.."></textarea>
                                    </div>
                                    <div class="col-12 mt-4">
                                        <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold">SEND</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-white border-top text-center mt-5">
        <p class="mb-0 text-muted small">&copy; 2026 RAMSPEED CY. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
