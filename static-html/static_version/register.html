<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MikeOnouf</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-image {
            background: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=1000') no-repeat center center;
            background-size: cover;
            min-height: 400px;
        }
        @media (min-width: 992px) {
            .register-image { min-height: 100vh; }
        }
    </style>
</head>
<body class="bg-light">

    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <!-- Left Side: Image -->
            <div class="col-lg-6 d-none d-lg-block">
                <div class="register-image w-100 h-100"></div>
            </div>

            <!-- Right Side: Form -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white">
                <div class="p-4 p-sm-5 py-lg-4 w-100" style="max-width: 600px;">
                    <div class="text-center mb-4">
                        <a href="dashboard.html" class="navbar-brand fw-bold fs-3 d-inline-block mb-3">
                            <span class="text-primary">Mike</span>Onouf
                        </a>
                        <h1 class="fw-bold mb-2">Create an Account</h1>
                        <p class="text-muted">Join our community and manage your shop efficiently.</p>
                    </div>

                    <form action="login.html" class="needs-validation" novalidate>
                        <div class="row mb-3">
                            <div class="col-sm-6 mb-3 mb-sm-0">
                                <label for="firstName" class="form-label small fw-semibold">First Name</label>
                                <input type="text" class="form-control py-2 rounded-3" id="firstName" placeholder="John" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="lastName" class="form-label small fw-semibold">Last Name</label>
                                <input type="text" class="form-control py-2 rounded-3" id="lastName" placeholder="Karter" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold">Email address</label>
                            <input type="email" class="form-control py-2 rounded-3" id="email" placeholder="john@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <input type="password" class="form-control py-2 rounded-3" id="password" placeholder="Create a password" required>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label small fw-semibold">Confirm Password</label>
                            <input type="password" class="form-control py-2 rounded-3" id="confirmPassword" placeholder="Confirm password" required>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="terms" required>
                            <label class="form-check-label small" for="terms">
                                I agree to the <a href="#" class="text-primary text-decoration-none">Terms and Conditions</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-full py-3 mb-4 rounded-3 shadow-sm fw-bold">Sign Up</button>

                        <div class="text-center small fw-medium">
                            Already have an account? <a href="login.html" class="text-primary text-decoration-none">Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
