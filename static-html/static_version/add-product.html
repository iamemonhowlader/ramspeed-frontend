<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | MikeOnouf Administration</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <header class="glass-header sticky-top py-2">
        <div class="container-fluid px-lg-5">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-link d-xl-none p-0 text-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                        <i class="bi bi-list fs-2"></i>
                    </button>
                    <a href="dashboard.html" class="navbar-brand fw-bold fs-4 d-flex align-items-center text-decoration-none">
                        <span class="text-primary">Mike</span>Onouf
                    </a>
                </div>
                <nav class="d-none d-xl-flex align-items-center gap-1">
                    <a href="dashboard.html" class="nav-link-premium">
                        <i class="bi bi-house"></i> Home
                    </a>
                    <a href="manage-products.html" class="nav-link-premium">
                        <i class="bi bi-box"></i> Products
                    </a>
                    <a href="add-product.html" class="nav-link-premium active">
                        <i class="bi bi-plus-circle"></i> Add Product
                    </a>
                </nav>
                <div class="d-flex align-items-center justify-content-end gap-2 gap-sm-4 flex-grow-1">
                     <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user" class="rounded-circle border" width="40" height="40">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-5 bg-light min-vh-100">
        <div class="container px-lg-5">
            <div class="card card-premium shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-white py-4 px-5 border-bottom">
                    <h3 class="fw-bold mb-1">Add your product details here</h3>
                    <p class="text-muted small mb-0">Fill in the details below to create a new product in your catalog.</p>
                </div>
                <div class="card-body p-5">
                    <form>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Product Name</label>
                                <input type="text" class="form-control py-3" placeholder="Enter product name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Category</label>
                                <select class="form-select py-3">
                                    <option selected disabled>Select Category</option>
                                    <option>Electronics</option>
                                    <option>Accessories</option>
                                    <option>Furniture</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Price (€)</label>
                                <input type="number" class="form-control py-3" placeholder="0.00">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Stock Quantity</label>
                                <input type="number" class="form-control py-3" placeholder="0">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold small">Short Description</label>
                                <textarea class="form-control" rows="3" placeholder="Enter brief product summary"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold small">Detailed Description</label>
                                <textarea class="form-control" rows="6" placeholder="Enter full product description"></textarea>
                            </div>
                             
                            <h5 class="fw-bold mt-5 mb-3">Product Media</h5>
                            <div class="col-md-12">
                                <div class="upload-area border-2 border-dashed rounded-4 p-5 text-center bg-light cursor-pointer">
                                    <i class="bi bi-cloud-arrow-up fs-2 text-primary mb-2 d-block"></i>
                                    <p class="mb-0 fw-bold small">Upload product images</p>
                                    <input type="file" class="d-none" multiple>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top">
                            <button type="button" class="btn btn-outline-secondary px-5 py-3 rounded-3 fw-bold">Cancel</button>
                            <button type="submit" class="btn btn-primary px-5 py-3 rounded-3 fw-bold shadow-sm">Create Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-white border-top text-center">
        <p class="mb-0 text-muted small">&copy; 2026 MikeOnouf. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
