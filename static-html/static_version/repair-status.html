<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Status | RAMSPEED CY</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <span class="text-primary">RAM</span>SPEED
            </a>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <h2 class="fw-black text-dark mb-5">Repair Status of product</h2>
            
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-white border-bottom">
                            <tr>
                                <th class="ps-5 py-4 text-muted small uppercase">Product Name</th>
                                <th class="py-4 text-muted small uppercase">Repair Cost</th>
                                <th class="py-4 text-muted small uppercase">Issue</th>
                                <th class="py-4 text-muted small uppercase">Repair Status</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white">
                            <tr>
                                <td class="ps-5 py-4">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="bg-light p-2 rounded" style="width: 50px; height: 50px;">
                                            <img src="https://images.unsplash.com/photo-1593642632823-8f785ba67e45?auto=format&fit=crop&q=80&w=100" class="img-fluid" alt="">
                                        </div>
                                        <span class="fw-bold">Xbox Series - 1TB Gaming</span>
                                    </div>
                                </td>
                                <td class="py-4 fw-bold text-primary">€ 300.45</td>
                                <td class="py-4">
                                    <span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-10 px-3 py-2 rounded-3">SYSTEM PROBLEM</span>
                                </td>
                                <td class="py-4">
                                    <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-10 px-3 py-2 rounded-3">WAITING FOR PARTS</span>
                                </td>
                            </tr>
                            <tr>
                                <td class="ps-5 py-4">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="bg-light p-2 rounded" style="width: 50px; height: 50px;">
                                            <img src="https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?auto=format&fit=crop&q=80&w=100" class="img-fluid" alt="">
                                        </div>
                                        <span class="fw-bold">Sam sung galaxy A83</span>
                                    </div>
                                </td>
                                <td class="py-4 fw-bold text-primary">€ 150.00</td>
                                <td class="py-4">
                                    <span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-10 px-3 py-2 rounded-3">BROKEN DISPLAY</span>
                                </td>
                                <td class="py-4">
                                    <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-10 px-3 py-2 rounded-3">READY FOR PICKUP</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="d-flex justify-content-center gap-3 mt-5">
                <button class="btn btn-outline-primary rounded-circle p-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;"><i class="bi bi-chevron-left"></i></button>
                <button class="btn btn-outline-primary rounded-circle p-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-white text-center border-top mt-5">
        <p class="mb-0 text-muted small">&copy; 2026 RAMSPEED CY. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
