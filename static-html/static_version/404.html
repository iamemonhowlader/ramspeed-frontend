<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | RAMSPEED CY</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f8f9fa;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.1;
            position: absolute;
            z-index: 0;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="error-container position-relative">
        <div class="error-code">404</div>
        <div class="position-relative z-1 px-4">
            <h1 class="display-3 fw-bold mb-3">Oops! Page Not Found</h1>
            <p class="text-muted mb-5 lead">The page you're looking for might have been moved, deleted, or never existed.</p>
            <a href="index.html" class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow-sm">Back to Home</a>
        </div>
    </div>

</body>
</html>
