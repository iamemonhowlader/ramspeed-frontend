<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Navbar | MikeOnouf Administration</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <header class="glass-header sticky-top py-2">
        <div class="container-fluid px-lg-5">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-link d-xl-none p-0 text-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                        <i class="bi bi-list fs-2"></i>
                    </button>
                    <a href="dashboard.html" class="navbar-brand fw-bold fs-4 d-flex align-items-center text-decoration-none">
                        <span class="text-primary">Mike</span>Onouf
                    </a>
                </div>
                <nav class="d-none d-xl-flex align-items-center gap-1">
                    <a href="dashboard.html" class="nav-link-premium">
                        <i class="bi bi-house"></i> Home
                    </a>
                    <a href="custom-navbar.html" class="nav-link-premium active">
                        <i class="bi bi-list-nested"></i> Custom Navbar
                    </a>
                </nav>
                <div class="d-flex align-items-center justify-content-end gap-2 gap-sm-4 flex-grow-1">
                     <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user" class="rounded-circle border" width="40" height="40">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-5 bg-light min-vh-100">
        <div class="container-fluid px-lg-5">
            <div class="card card-premium shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-white py-4 px-5 border-bottom">
                    <h3 class="fw-bold mb-1">Custom Navigation Bar</h3>
                    <p class="text-muted small mb-0">Manage your website's primary navigation links.</p>
                </div>
                <div class="card-body p-5">
                    <!-- Form -->
                    <form class="mb-5 pb-5 border-bottom">
                        <div class="row g-4 align-items-end">
                            <div class="col-md-5">
                                <label class="form-label fw-semibold small">Link Label</label>
                                <input type="text" class="form-control py-2" placeholder="e.g. New Arrivals">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold small">Target URL</label>
                                <input type="text" class="form-control py-2" placeholder="/shop/new">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Add Link</button>
                            </div>
                        </div>
                    </form>

                    <div class="h-1 bg-primary rounded-pill mb-5" style="height: 6px !important;"></div>

                    <!-- Table -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4">Label</th>
                                    <th>URL</th>
                                    <th>Status</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-4 fw-bold">Home</td>
                                    <td>/index.html</td>
                                    <td><span class="badge rounded-pill bg-success bg-opacity-10 text-success">Active</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-light btn-sm"><i class="bi bi-trash text-danger"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="ps-4 fw-bold">Shop Now</td>
                                    <td>/shop.html</td>
                                    <td><span class="badge rounded-pill bg-success bg-opacity-10 text-success">Active</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-light btn-sm"><i class="bi bi-trash text-danger"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
